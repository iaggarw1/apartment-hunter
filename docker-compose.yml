services:
  web:
    build: .
    # --reload: restart on code changes (volume .:/code must be mounted)
    command:
      - python
      - -m
      - uvicorn
      - main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8080"
      - --reload
      - --reload-dir
      - /code
    env_file:
      - .env
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    ports:
      - "8080:8080"
    volumes:
      - .:/code
    working_dir: /code
  
  localstack:
    image: localstack/localstack
    ports:
      - 4566:4566
    environment:
      - DEBUG=1
      - SERVICES=s3, dynamodb, secretsmanager
